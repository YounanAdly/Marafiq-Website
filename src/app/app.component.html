
@if (languageService.isReady()) {
<a
    href="#main-content"
    (click)="skipToContent($event)"
    class="skip-to-content">
    Skip to content
</a>
<ng-container>
    <app-header></app-header>
    <main id="main-content" tabindex="-1">
        <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
    <app-global-loader />
</ng-container>
}
